name: Nolio Ingestion Robot

on:
  schedule:
    # Toutes les 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis l'interface GitHub

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r deps.txt

      - name: Run Ingestion Robot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NOLIO_CLIENT_ID: ${{ secrets.NOLIO_CLIENT_ID }}
          NOLIO_CLIENT_SECRET: ${{ secrets.NOLIO_CLIENT_SECRET }}
          NOLIO_REFRESH_TOKEN: ${{ secrets.NOLIO_REFRESH_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python run_k.py ingest --days 3
